databaseChangeLog:
  - changeSet:
      id: 010-create-reviews
      author: gael
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: user_id
            constraintName: fk_review_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: product_id
            constraintName: fk_review_product
            referencedTableName: products
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: reviews
            columnNames: user_id, product_id
            constraintName: uq_review_user_product
      rollback:
        - dropTable:
            tableName: reviews
