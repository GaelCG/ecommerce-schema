name: Database Migration

on:
  push:
    branches:
      - main
    paths:
      - 'changelog/**'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Liquibase
        run: |
          wget -q https://github.com/liquibase/liquibase/releases/download/v4.33.0/liquibase-4.33.0.tar.gz
          sudo mkdir -p /opt/liquibase
          sudo tar -xzf liquibase-4.33.0.tar.gz -C /opt/liquibase
          sudo ln -s /opt/liquibase/liquibase /usr/local/bin/liquibase

      - name: Run migrations
        run: |
          liquibase \
            --changeLogFile=changelog/db.changelog-master.yaml \
            --url="${{ secrets.DB_URL }}" \
            --username="${{ secrets.DB_USERNAME }}" \
            --password="${{ secrets.DB_PASSWORD }}" \
            update
